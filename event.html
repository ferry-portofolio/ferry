<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Oshku Pangan Indonesia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

        .nav-header { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 30px; 
            z-index: 100; display: flex; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .back-btn { 
            color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); 
            padding: 10px 20px; border-radius: 30px; font-size: 0.9rem;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; /* Gerakkan video ke bawah */
            background: #000;
            padding: 20px 20px 80px 20px;
            transition: opacity 0.8s ease, transform 0.8s ease;
            opacity: 0.3;
            transform: scale(0.85);
        }

        .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
        }
        
        .video-container { 
            width: 451px; 
            height: 500px; 
            position: relative; 
            border-radius: 0; /* Hilangkan case */
            overflow: hidden;
            box-shadow: none; /* Hilangkan case */
            border: none; /* Hilangkan case */
            cursor: grab;
        }

        .video-container:active { cursor: grabbing; }

        .interaction-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: transparent;
        }

        @media (max-width: 768px) {
            .video-container {
                height: 60vh;
                width: 100%;
            }
            .swiper-slide {
                padding: 10px;
            }
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Swipe hint */
        .swipe-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-transform: uppercase; letter-spacing: 5px;
            font-size: 0.7rem; color: rgba(255,255,255,0.2); pointer-events: none;
            animation: bounceLeftRight 2s infinite;
        }

        @keyframes bounceLeftRight {
            0%, 100% { transform: translateX(-50%) translateX(-10px); }
            50% { transform: translateX(-50%) translateX(10px); }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="about.html" class="back-btn">← Kembali</a>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper">
            <!-- Video 1 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <video loop playsinline muted autoplay>
                        <source src="https://drive.google.com/uc?export=download&id=10tfj6RP6ZP1qwW6tTU8GJAS_P2d2ww9h" type="video/mp4">
                    </video>
                </div>
            </div>

            <!-- Video 2 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <video loop playsinline muted autoplay>
                        <source src="https://drive.google.com/uc?export=download&id=1aP29hWndWWeyKvGKw8IlHESYShL2nuHT" type="video/mp4">
                    </video>
                </div>
            </div>

            <!-- Video 3 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <video loop playsinline muted autoplay>
                        <source src="https://drive.google.com/uc?export=download&id=15X1Aw_TCnFUuLu5pswtUIVAfkxYroBFV" type="video/mp4">
                    </video>
                </div>
            </div>

            <!-- Video 4 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <video loop playsinline muted autoplay>
                        <source src="https://drive.google.com/uc?export=download&id=1x_zPgYZKNdgv3-KNAkmhLFWr6lUua0Ds" type="video/mp4">
                    </video>
                </div>
            </div>

            <!-- Video 5 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <video loop playsinline muted autoplay>
                        <source src="https://drive.google.com/uc?export=download&id=1tavhtEmxSCoKKqw1VVdrO-qJF2ucXsGV" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
        <div class="swipe-hint">Swipe left/right</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true,
            mousewheel: true,
            centeredSlides: true,
            slidesPerView: 1.2,
            spaceBetween: 10,
            speed: 800,
            threshold: 5,
            grabCursor: true,
            touchRatio: 1.5,
            breakpoints: {
                768: {
                    slidesPerView: 2.2,
                    spaceBetween: 30,
                }
            },
            on: {
                slideChangeTransitionEnd: function () {
                    // Mute all video tags
                    document.querySelectorAll('video').forEach(video => {
                        video.muted = true;
                    });

                    // Unmute current active slide
                    const activeSlide = this.slides[this.activeIndex];
                    const activeVideo = activeSlide.querySelector('video');

                    if (activeVideo) {
                        activeVideo.muted = false;
                    }
                }
            }
        });

        function toggleMute(container) {
            const video = container.querySelector('video');
            if (video) {
                video.muted = !video.muted;
            }
        }
    </script>
</body>
</html>
