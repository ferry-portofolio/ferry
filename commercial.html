<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengalaman di Mangooni</title>
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

        .nav-header { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 30px; 
            z-index: 100; display: flex; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .back-btn { 
            color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); 
            padding: 10px 20px; border-radius: 30px; font-size: 0.9rem;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; }

        .swiper { width: 100%; height: 100vh; }
        .swiper-slide { 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; /* Gerakkan video ke bawah */
            background: #000;
            padding: 20px 20px 80px 20px; /* Tambah padding bawah agar tidak mepet dasar */
            transition: opacity 0.8s ease, transform 0.8s ease;
            opacity: 0.3; 
            transform: scale(0.85);
        }

        .swiper-slide-active {
            opacity: 1;
            transform: scale(1);
        }
        
        .video-container { 
            width: 451px; 
            height: 500px; 
            position: relative; 
            border-radius: 0; /* Hilangkan case */
            overflow: hidden;
            box-shadow: none; /* Hilangkan case */
            border: none; /* Hilangkan case */
            cursor: grab;
        }

        .video-container:active { cursor: grabbing; }

        .interaction-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: transparent;
        }

        @media (max-width: 768px) {
            .video-container {
                height: 60vh;
                width: 100%;
            }
            .swiper-slide {
                padding: 10px;
            }
        }

        video, iframe { width: 100%; height: 100%; object-fit: cover; }

        /* Swipe hint */
        .swipe-hint {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-transform: uppercase; letter-spacing: 5px;
            font-size: 0.7rem; color: rgba(255,255,255,0.2); pointer-events: none;
            animation: bounceLeftRight 2s infinite;
        }

        @keyframes bounceLeftRight {
            0%, 100% { transform: translateX(-50%) translateX(-10px); }
            50% { transform: translateX(-50%) translateX(10px); }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="about.html" class="back-btn">← Kembali</a>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper">
            <!-- Video 1 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <div class="w-full h-full yt-wrapper">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/AglOywst9GA?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=AglOywst9GA&controls=0&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
                    </div>
                </div>
            </div>

            <!-- Video 2 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <div class="w-full h-full yt-wrapper">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/1lAQxChiSF0?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=1lAQxChiSF0&controls=0&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
                    </div>
                </div>
            </div>

            <!-- Video 3 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <div class="w-full h-full yt-wrapper">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/xRIggNSqz54?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=xRIggNSqz54&controls=0&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
                    </div>
                </div>
            </div>

            <!-- Video 4 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <div class="w-full h-full yt-wrapper">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/fzk1lF3SIaM?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=fzk1lF3SIaM&controls=0&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
                    </div>
                </div>
            </div>

            <!-- Video 5 -->
            <div class="swiper-slide">
                <div class="video-container" onclick="toggleMute(this)">
                    <div class="interaction-layer"></div>
                    <div class="w-full h-full yt-wrapper">
                        <iframe class="yt-player" src="https://www.youtube.com/embed/D3A7Nimo7y8?enablejsapi=1&autoplay=1&mute=1&loop=1&playlist=D3A7Nimo7y8&controls=0&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
                    </div>
                </div>
            </div>
        </div>
        <div class="swipe-hint">Swipe left/right</div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let players = [];
        function onYouTubeIframeAPIReady() {
            const iframes = document.querySelectorAll('.yt-player');
            iframes.forEach((iframe, index) => {
                players[index] = new YT.Player(iframe, {
                    events: {
                        'onReady': (event) => {}
                    }
                });
            });
        }

        const swiper = new Swiper('.swiper', {
            direction: 'horizontal',
            loop: true,
            mousewheel: true,
            centeredSlides: true,
            slidesPerView: 1.2,
            spaceBetween: 10,
            speed: 800, 
            threshold: 5,
            grabCursor: true,
            touchRatio: 1.5,
            breakpoints: {
                768: {
                    slidesPerView: 2.2,
                    spaceBetween: 30,
                }
            },
            on: {
                slideChangeTransitionEnd: function () {
                    // Mute all native videos
                    document.querySelectorAll('video').forEach(video => {
                        video.muted = true;
                    });
                    
                    // Mute all YouTube players
                    players.forEach(player => {
                        if (player && typeof player.mute === 'function') {
                            player.mute();
                        }
                    });

                    // Unmute current active slide
                    const activeSlide = this.slides[this.activeIndex];
                    const activeVideo = activeSlide.querySelector('video');
                    const activeIframe = activeSlide.querySelector('iframe');

                    if (activeVideo) {
                        activeVideo.muted = false;
                    } else if (activeIframe) {
                        const player = players.find(p => p.getIframe() === activeIframe);
                        if (player && typeof player.unMute === 'function') {
                            player.unMute();
                        }
                    }
                }
            }
        });

        function toggleMute(container) {
            const video = container.querySelector('video');
            const iframe = container.querySelector('iframe');
            
            if (video) {
                video.muted = !video.muted;
            } else if (iframe) {
                // Find matching player
                const player = players.find(p => p.getIframe() === iframe);
                if (player && typeof player.isMuted === 'function') {
                    if (player.isMuted()) {
                        player.unMute();
                    } else {
                        player.mute();
                    }
                }
            }
        }
    </script>
</body>
</html>
